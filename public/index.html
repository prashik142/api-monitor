<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Monitor Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-8 font-sans">
    <div class="max-w-5xl mx-auto">
        
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-100">📡 API Status Dashboard</h1>
            <span class="text-sm text-gray-400" id="last-updated">Updating...</span>
        </div>

        <div class="bg-gray-800 border border-gray-700 rounded-lg p-6 mb-8">
            <h2 class="text-xl font-semibold mb-4 text-gray-200">➕ Add New API Monitor</h2>
            <form id="add-monitor-form" class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">API Name</label>
                    <input type="text" id="monitor-name" required placeholder="e.g., Production Auth" 
                        class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-white focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Endpoint URL</label>
                    <input type="url" id="monitor-url" required placeholder="https://api.example.com/health" 
                        class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-white focus:outline-none focus:border-blue-500">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-1">Method</label>
                        <select id="monitor-method" 
                            class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-white focus:outline-none focus:border-blue-500">
                            <option value="GET">GET</option>
                            <option value="POST">POST</option>
                            <option value="PUT">PUT</option>
                            <option value="DELETE">DELETE</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-1">Expected Status</label>
                        <input type="number" id="monitor-status" required value="200" 
                            class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-white focus:outline-none focus:border-blue-500">
                    </div>
                </div>
                <div>
                    <button type="submit" 
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium p-2 rounded transition-colors duration-200">
                        Add Monitor
                    </button>
                </div>
            </form>
            <p id="form-message" class="text-sm mt-3 hidden"></p>
        </div>

        <div id="monitors-container" class="grid grid-cols-1 gap-4">
            </div>
    </div>

    <script>
        // ==========================================
        // FETCH AND RENDER MONITORS
        // ==========================================
        async function fetchMonitors() {
            try {
                const response = await fetch('/monitors');
                const monitors = await response.json();
                const container = document.getElementById('monitors-container');
                container.innerHTML = ''; 

                if (monitors.length === 0) {
                    container.innerHTML = `
                        <div class="text-center p-12 bg-gray-800/50 rounded-lg border border-gray-700/50">
                            <p class="text-gray-400">No endpoints are currently being monitored. Add one above!</p>
                        </div>
                    `;
                    return;
                }

                monitors.forEach(monitor => {
                    const latestResult = monitor.results[0]; 
                    const isUp = latestResult?.status === 'UP';
                    
                    const card = document.createElement('div');
                    card.className = `p-6 rounded-lg border transition-all duration-300 ${isUp ? 'bg-gray-800 border-green-500/30 shadow-lg shadow-green-950/10' : 'bg-red-950/20 border-red-500/30'}`;

                    card.innerHTML = `
                        <div class="flex justify-between items-center">
                            <div>
                                <div class="flex items-center gap-3 mb-2">
                                    <div class="w-3 h-3 rounded-full ${isUp ? 'bg-green-500 animate-pulse' : 'bg-red-500'}"></div>
                                    <h2 class="text-xl font-semibold tracking-wide">${monitor.name}</h2>
                                    <span class="text-xs px-2 py-0.5 rounded font-mono bg-gray-900 text-gray-400">${monitor.method}</span>
                                </div>
                                <p class="text-gray-400 text-sm font-mono">${monitor.url}</p>
                            </div>
                            <div class="text-right">
                                <div class="text-2xl font-mono font-bold ${isUp ? 'text-green-400' : 'text-red-400'}">
                                    ${latestResult ? latestResult.responseTime + 'ms' : 'Waiting...'}
                                </div>
                                <p class="text-sm text-gray-500 mt-1">
                                    Status Code: ${latestResult ? latestResult.statusCode : 'N/A'}
                                </p>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });

                document.getElementById('last-updated').innerText = 'Last updated: ' + new Date().toLocaleTimeString();
            } catch (error) {
                console.error('Failed to fetch monitors:', error);
            }
        }

        // ==========================================
        // HANDLE FORM SUBMISSION
        // ==========================================
        document.getElementById('add-monitor-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('monitor-name').value;
            const url = document.getElementById('monitor-url').value;
            const method = document.getElementById('monitor-method').value;
            const expectedStatus = parseInt(document.getElementById('monitor-status').value, 10);
            
            const messageEl = document.getElementById('form-message');
            
            try {
                const response = await fetch('/monitors', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, url, method, expectedStatus })
                });

                if (response.ok) {
                    // Flash success message
                    messageEl.textContent = '✅ Monitor added successfully! Pinging will begin shortly.';
                    messageEl.className = 'text-sm mt-3 text-green-400 block';
                    
                    // Reset fields except the defaults
                    document.getElementById('monitor-name').value = '';
                    document.getElementById('monitor-url').value = '';
                    document.getElementById('monitor-method').value = 'GET';
                    document.getElementById('monitor-status').value = '200';
                    
                    // Refresh data layout immediately
                    fetchMonitors();
                } else {
                    throw new Error('Server returned an error');
                }
            } catch (error) {
                messageEl.textContent = '❌ Failed to create monitor. Verify your network or server status.';
                messageEl.className = 'text-sm mt-3 text-red-400 block';
            }

            // Hide the message status alert banner after 4 seconds
            setTimeout(() => { messageEl.className = 'hidden'; }, 4000);
        });

        // Initialize polling intervals
        fetchMonitors();
        setInterval(fetchMonitors, 10000);
    </script>
</body>
</html>
